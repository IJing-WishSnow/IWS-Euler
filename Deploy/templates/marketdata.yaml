apiVersion: apps/v1
kind: Deployment
metadata:
  name: iws-marketdata
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.marketdata.replicas }}
  selector:
    matchLabels:
      app: iws-marketdata
  template:
    metadata:
      labels:
        app: iws-marketdata
    spec:
      containers:
        - name: iws-marketdata
          image: {{ .Values.marketdata.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.marketdata.port }}
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
          readinessProbe:
            tcpSocket:
              port: {{ .Values.marketdata.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: iws-marketdata
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: iws-marketdata
  ports:
    - port: {{ .Values.marketdata.port }}
      targetPort: {{ .Values.marketdata.port }}
