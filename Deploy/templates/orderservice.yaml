apiVersion: apps/v1
kind: Deployment
metadata:
  name: iws-orderservice
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.orderservice.replicas }}
  selector:
    matchLabels:
      app: iws-orderservice
  template:
    metadata:
      labels:
        app: iws-orderservice
    spec:
      containers:
        - name: iws-orderservice
          image: {{ .Values.orderservice.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.orderservice.port }}
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: PORT
              value: {{ .Values.orderservice.port | quote }}
            - name: GIN_MODE
              value: "release"
          readinessProbe:
            tcpSocket:
              port: {{ .Values.orderservice.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: iws-orderservice
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: iws-orderservice
  ports:
    - port: {{ .Values.orderservice.port }}
      targetPort: {{ .Values.orderservice.port }}
