apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.webapp.replicas }}
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: {{ .Values.webapp.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.webapp.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.webapp.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
    - port: {{ .Values.webapp.port }}
      targetPort: {{ .Values.webapp.port }}
      nodePort: 30080
